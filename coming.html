<!DOCTYPE html>
<html class="no-js" lang="en">

<head>
    <!-- Meta Tags -->
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Thememarch" />
    <!-- Favicon Icon -->
    <link rel="icon" href="assets/img/iconQuali.png" />
    <!-- Site Title -->
    <title>Constr - Construction & Building</title>
    <link rel="stylesheet" href="assets/css/plugins/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/plugins/swiper.min.css" />
    <link rel="stylesheet" type="text/css" href="assets/fonts/flaticon.css" />
    <link rel="stylesheet" href="assets/css/plugins/aos.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
    <!-- Start Preloader -->
    <div id="constr-preloader">
        <div id="constr-status" role="status" aria-live="polite">
            <div class="preloader-content">
                <div class="constr-spinner">
                    <div class="constr-rect rect1"></div>
                    <div class="constr-rect rect2"></div>
                    <div class="constr-rect rect3"></div>
                    <div class="constr-rect rect4"></div>
                    <div class="constr-rect rect5"></div>
                    <div class="constr-rect rect6"></div>
                    <div class="constr-rect rect7"></div>
                </div>
                <div class="constr-text">Loading, please wait...</div>
            </div>
        </div>
    </div>
    <!-- End Preloader -->

    <!-- Start Coming Section -->
    <section class="coming-wrapper" data-src="assets/img/coming-bg.jpg">
        <div class="container coming-wrap">
            <h1 class="comming-title">Coming Soon</h1>
            <div id="comming-section" class="row comin-wrap-in">
                <div class="col-lg-1"></div>
                <div class="col-lg-2 col-md-6">
                    <div class="time-card">
                        <h1 class="time-text ak-stroke-number color-white" id="months">5</h1>
                        <p>Months</p>
                    </div>
                </div>
                <div class="col-lg-2 col-md-6">
                    <div class="time-card">
                        <h1 class="time-text ak-stroke-number color-white" id="days">27</h1>
                        <p>Days</p>
                    </div>
                </div>
                <div class="col-lg-2 col-md-6">
                    <div class="time-card">
                        <h1 class="time-text ak-stroke-number color-white" id="hours">12</h1>
                        <p>Hours</p>
                    </div>
                </div>
                <div class="col-lg-2 col-md-6">
                    <div class="time-card">
                        <h1 class="time-text ak-stroke-number color-white" id="minutes">34</h1>
                        <p>Minutes</p>
                    </div>
                </div>
                <div class="col-lg-2 col-md-6">
                    <div class="time-card">
                        <h1 class="time-text ak-stroke-number color-white" id="secound">45</h1>
                        <p>Seconds</p>
                    </div>
                </div>
                <div class="col-lg-1"></div>
            </div>
        </div>
    </section>
    <!-- End Coming Section -->

    <!-- Start Scrollup -->
    <span class="cs_scrollup">
        <i class="flaticon-top"></i>
    </span>
    <!-- End Scrollup -->

    <!-- Script -->
    <script src="assets/js/plugins/jquery-3.7.0.min.js"></script>
    <script src="assets/js/plugins/swiper.min.js"></script>
    <script src="assets/js/plugins/SplitText.min.js"></script>
    <script src="assets/js/plugins/ScrollToPlugin.min.js"></script>
    <script src="assets/js/plugins/ScrollTrigger.min.js"></script>
    <script src="assets/js/plugins/gsap.min.js"></script>
    <script src="assets/js/plugins/aos.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
